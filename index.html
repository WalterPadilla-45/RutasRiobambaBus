<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="theme-color" content="#1e3a5f" />
    <meta name="description" content="Rutas de transporte público de Riobamba, Ecuador. Mapa interactivo offline-first con buscador de rutas." />

    <!-- PWA: Apple Mobile Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RíoRutas" />

    <!-- PWA: Mobile Web App -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Riobamba Rutas" />

    <!-- PWA: Microsoft -->
    <meta name="msapplication-TileColor" content="#1e3a5f" />
    <meta name="msapplication-navbutton-color" content="#1e3a5f" />
    <meta name="msapplication-TileImage" content="/pwa-144x144.png" />

    <!-- PWA: Favicon e iconos Apple Touch -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/pwa-152x152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/pwa-192x192.png" />

    <!-- iOS Splash Screens (iPhone/Xr/11, iPhone X/11 Pro, iPhone 12/13/14) -->
    <link rel="apple-touch-startup-image" href="/pwa-512x512.png" />

    <!-- Preconnect para mejorar velocidad de carga de tiles -->
    <link rel="preconnect" href="https://tile.openstreetmap.org" />
    <link rel="preconnect" href="https://a.tile.openstreetmap.org" />
    <link rel="preconnect" href="https://b.tile.openstreetmap.org" />
    <link rel="preconnect" href="https://c.tile.openstreetmap.org" />

    <!-- Google Fonts: Inter (tipografía premium) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <title>Riobamba Rutas</title>

    <!-- Estilo inline para splash/FOUC prevention -->
    <style>
      /* Pantalla de carga inicial antes de que React hidrate */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        background: linear-gradient(135deg, #1e3a5f 0%, #2d5a8e 100%);
      }
      #root:empty::after {
        content: 'RíoRutas';
        color: #ffffff;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        animation: pulse-logo 1.5s ease-in-out infinite;
      }
      @keyframes pulse-logo {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
